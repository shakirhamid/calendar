<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner - Settings</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="settings">
  <div class="app-shell">
    <main class="page-content">
      <section class="hero">
        <div>
          <h1>Settings</h1>
          <p>Manage appearance, backup, and planner data.</p>
        </div>
        <div class="hero-badge">ST</div>
      </section>

      <section class="settings-card card">
        <div class="theme-toggle">
          <div>
            <h3>Theme</h3>
            <p id="theme-label">Light mode is active.</p>
          </div>
          <button class="theme-switch" id="theme-toggle" type="button" aria-pressed="false"></button>
        </div>
      </section>

      <section class="settings-card card">
        <h3>Backup</h3>
        <p>Export or import your planner data.</p>
        <div class="settings-actions">
          <button class="secondary-button" id="export-button" type="button">Export</button>
          <button class="ghost-button" id="import-button" type="button">Import</button>
        </div>
        <input id="import-file-input" type="file" accept="application/json" hidden />
      </section>

      <section class="settings-card card">
        <h3>Danger zone</h3>
        <p>Delete all saved sessions and preferences.</p>
        <button class="danger-button" id="reset-button" type="button">Reset all data</button>
      </section>
    </main>

    <nav class="tab-bar">
      <a class="tab-link" href="./sessions.html">Sessions</a>
      <a class="tab-link" href="./analytics.html">Analytics</a>
      <a class="tab-link active" href="./settings.html">Settings</a>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/storage.js" defer></script>
  <script src="../js/ui.js" defer></script>
  <script src="../js/settings.js" defer></script>
  <script src="../app.js" defer></script>
</body>
</html>
